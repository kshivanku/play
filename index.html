<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A modern portfolio of browser games by Shivanku Kumar."
    />
    <title>Play</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <main id="top">
      <section class="hero-scroll" data-scroll-hero aria-label="Play hero">
        <div class="hero-sticky">
          <h1 class="play-title" data-play-title aria-label="Play">
            <span>P</span>
            <span>L</span>
            <span>A</span>
            <span>Y</span>
          </h1>
        </div>
      </section>

      <section class="games" id="games" aria-label="Selected games">
        <div class="game-list">
          <article class="game-row">
            <div class="game-row__copy">
              <h3>Take a scroll break</h3>
            </div>
            <a
              class="game-row__media"
              href="https://kshivanku.github.io/scroll-break/"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Open Take a scroll break"
            >
              <video
                data-game-video="scroll-break"
                autoplay
                loop
                muted
                playsinline
                preload="metadata"
              ></video>
            </a>
          </article>

          <article class="game-row">
            <div class="game-row__copy">
              <h3>You Are My Timer</h3>
            </div>
            <a
              class="game-row__media"
              href="https://kshivanku.github.io/youaremytimer/"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Open You Are My Timer"
            >
              <video
                data-game-video="you-are-my-timer"
                autoplay
                loop
                muted
                playsinline
                preload="metadata"
              ></video>
            </a>
          </article>

          <article class="game-row">
            <div class="game-row__copy">
              <h3>Be Grateful</h3>
            </div>
            <a
              class="game-row__media"
              href="https://kshivanku.github.io/begrateful/"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Open Be Grateful"
            >
              <video
                data-game-video="be-grateful"
                autoplay
                loop
                muted
                playsinline
                preload="metadata"
              ></video>
            </a>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
