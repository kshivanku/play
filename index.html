<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A modern portfolio of browser games by Shivanku Kumar."
    />
    <title>Play</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#top" aria-label="Play home">
        <span class="brand__dot brand__dot--blue"></span>
        <span class="brand__dot brand__dot--green"></span>
        <span class="brand__dot brand__dot--red"></span>
        <span>Play</span>
      </a>
      <a class="nav-link" href="#games">Games</a>
    </header>

    <main id="top">
      <section class="hero-scroll" data-scroll-hero aria-label="Play hero">
        <div class="hero-sticky">
          <h1 class="play-title" data-play-title aria-label="Play">
            <span>P</span>
            <span>L</span>
            <span>A</span>
            <span>Y</span>
          </h1>
        </div>
      </section>

      <section class="games" id="games" aria-labelledby="games-title">
        <div class="section-heading">
          <p>Selected work</p>
          <h2 id="games-title">Games</h2>
        </div>

        <div class="game-list">
          <article class="game-row">
            <div class="game-row__copy">
              <p class="game-row__type">Game 01</p>
              <h3>Be Grateful</h3>
            </div>
            <a class="game-row__media" href="#" aria-label="Open Be Grateful">
              <video
                data-game-video="be-grateful"
                autoplay
                loop
                muted
                playsinline
                preload="metadata"
              ></video>
            </a>
          </article>

          <article class="game-row">
            <div class="game-row__copy">
              <p class="game-row__type">Game 02</p>
              <h3>You Are My Timer</h3>
            </div>
            <a class="game-row__media" href="#" aria-label="Open You Are My Timer">
              <video
                data-game-video="you-are-my-timer"
                autoplay
                loop
                muted
                playsinline
                preload="metadata"
              ></video>
            </a>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
