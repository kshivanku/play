<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A modern portfolio of browser games by Shivanku Kumar."
    />
    <title>Play</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#top" aria-label="Play home">
        <span class="brand__dot brand__dot--blue"></span>
        <span class="brand__dot brand__dot--green"></span>
        <span class="brand__dot brand__dot--red"></span>
        <span>Play</span>
      </a>
      <a class="nav-link" href="#games">Games</a>
    </header>

    <main id="top">
      <section class="hero-scroll" data-scroll-hero aria-label="Play hero">
        <div class="hero-sticky">
          <h1 class="play-title" data-play-title aria-label="Play">
            <span>P</span>
            <span>L</span>
            <span>A</span>
            <span>Y</span>
          </h1>
        </div>
      </section>

      <section class="games" id="games" aria-labelledby="games-title">
        <div class="section-heading">
          <p>Selected work</p>
          <h2 id="games-title">Games</h2>
        </div>

        <div class="game-grid">
          <article class="game-card">
            <div class="game-card__preview preview-a"></div>
            <div class="game-card__body">
              <p class="game-card__type">Puzzle</p>
              <h3>Orbit Shift</h3>
              <p>Redirect momentum through compact orbital boards.</p>
              <a href="#" aria-label="Open Orbit Shift">Open</a>
            </div>
          </article>

          <article class="game-card">
            <div class="game-card__preview preview-b"></div>
            <div class="game-card__body">
              <p class="game-card__type">Arcade</p>
              <h3>Line Runner</h3>
              <p>Thread quick decisions through a reactive course.</p>
              <a href="#" aria-label="Open Line Runner">Open</a>
            </div>
          </article>

          <article class="game-card">
            <div class="game-card__preview preview-c"></div>
            <div class="game-card__body">
              <p class="game-card__type">Strategy</p>
              <h3>Gridfall</h3>
              <p>Plan around shifting tiles before the board closes in.</p>
              <a href="#" aria-label="Open Gridfall">Open</a>
            </div>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
